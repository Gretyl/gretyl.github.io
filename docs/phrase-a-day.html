<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Phrase a Day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Georgia, "Times New Roman", serif;
    overflow: hidden;
    transition: background-color 0.4s ease, color 0.4s ease;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 5vh 6vw;
    padding: max(5vh, env(safe-area-inset-top)) max(6vw, env(safe-area-inset-right)) max(5vh, env(safe-area-inset-bottom)) max(6vw, env(safe-area-inset-left));
    box-sizing: border-box;
    text-align: center;
  }  
  .date {
    font-size: clamp(0.8rem, 1.6vw, 1.1rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 4vh;
  }
  .phrase {
    font-family: "Fraunces", Georgia, serif;
    font-size: clamp(1.8rem, 5.5vw, 4.5rem);
    line-height: 1.2;
    font-style: italic;
    font-weight: 400;
    font-variation-settings: "SOFT" 100, "opsz" 144;
    max-width: 22ch;
    text-wrap: balance;
    cursor: pointer;
    background: none;
    border: none;
    color: inherit;
    padding: 0.5rem 1rem;
    border-radius: 0.5rem;
    transition: opacity 0.6s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .phrase:focus-visible {
    outline: 2px solid currentColor;
    outline-offset: 0.5rem;
  }
  .phrase.fading {
    opacity: 0;
  }
  .footer {
    position: fixed;
    bottom: 2vh;
    font-size: 0.75rem;
    opacity: 0.7;
    letter-spacing: 0.15em;
  }
  .speaker, .share {
    position: fixed;
    background: none;
    border: none;
    color: inherit;
    font-size: 1.5rem;
    opacity: 0.6;
    cursor: pointer;
    padding: 1rem;
    border-radius: 0.5rem;
    transition: opacity 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .speaker:hover, .share:hover { opacity: 0.95; }
  .speaker:focus-visible, .share:focus-visible {
    outline: 2px solid currentColor;
    outline-offset: 2px;
    opacity: 0.95;
  }
  .speaker.speaking { opacity: 1; }
  .share.copied { opacity: 1; }
  .speaker.tl, .share.tl { top: 2vh; left: 2vw; }
  .speaker.tr, .share.tr { top: 2vh; right: 2vw; }
  .speaker.bl, .share.bl { bottom: 2vh; left: 2vw; }
  .speaker.br, .share.br { bottom: 2vh; right: 2vw; }
  @media (prefers-reduced-motion: reduce) {
    html, body, .phrase, .speaker, .share {
      transition: none !important;
    }
  }
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
  @media (min-height: 600px) {
    body { min-height: 600px; }
    .date {
      position: absolute;
      top: 25vh;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 0;
    }
  }
</style>
</head>
<body>
  <button class="speaker" id="speaker" type="button" aria-label="Read phrase aloud">
    <span aria-hidden="true">🔊</span>
  </button>
  <button class="share tr" id="share" type="button" aria-label="Copy link to this phrase">
    <span aria-hidden="true" id="share-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
    </span>
  </button>
  <time class="date" id="date"></time>
  <button
    class="phrase"
    id="phrase"
    type="button"
    aria-live="polite"
    aria-label="Tap to reveal a different phrase"
  ></button>
  <div class="footer" id="footer" aria-hidden="true"></div>

<script>

// Minimum WCAG contrast ratio between foreground and background.
// 4.5 = AA normal text, 7.0 = AAA normal text. Since our text is large,
// AA-large is 3.0 and AAA-large is 4.5 — we use ~7.0 as a comfortable floor.
const MIN_CONTRAST = 6.969;

// Seedable PRNG (mulberry32) — used for hash-based ordering and corner RNG.
function mulberry32(seed) {
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Hash-based ordering: each phrase gets a deterministic score from its own
// number, independent of how many phrases exist. Adding phrases inserts them
// at their hash-determined position without disturbing the existing order.
const SEED = 696969;
function stableOrder(phrases) {
  return phrases.slice().sort((a, b) => {
    return mulberry32(SEED + a.num)() - mulberry32(SEED + b.num)();
  });
}

const EPOCH = new Date(2026, 3, 9);  // April 9, 2026 — first commit
function daysSinceEpoch(date) {
  return Math.floor((date - EPOCH) / 86400000);
}

// --- WCAG contrast helpers ---
function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return [f(0), f(8), f(4)];
}
function relLuminance(h, s, l) {
  const [r, g, b] = hslToRgb(h, s, l);
  const lin = c => c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
  return 0.2126 * lin(r) + 0.7152 * lin(g) + 0.0722 * lin(b);
}
function contrastRatio(hsl1, hsl2) {
  const L1 = relLuminance(...hsl1);
  const L2 = relLuminance(...hsl2);
  const [hi, lo] = L1 > L2 ? [L1, L2] : [L2, L1];
  return (hi + 0.05) / (lo + 0.05);
}

// Parse phrases.md. Each line looks like "1. The phrase text here."
// Returns { phrases: [...], totalCount: N } where totalCount is the maximum
// non-empty row index found in the file — so adding new phrases bumps the
// "of NNN" counter visibly even before all slots are filled.
function parsePhrases(markdown) {
  const lineRegex = /^(\d+)\.\s+(.*\S.*)$/;
  const phrases = [];
  let totalCount = 0;
  for (const line of markdown.split(/\r?\n/)) {
    const m = line.match(lineRegex);
    if (!m) continue;
    const n = parseInt(m[1], 10);
    const text = m[2].trim();
    if (!text) continue;
    phrases.push({ text, num: n });
    if (n > totalCount) totalCount = n;
  }
  return { phrases, totalCount };
}

async function init() {
  let phrases, totalCount;
  try {
    const res = await fetch("assets/phrases.md");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();
    ({ phrases, totalCount } = parsePhrases(md));
    if (phrases.length === 0) throw new Error("No phrases found in phrases.md");
  } catch (err) {
    document.getElementById("phrase").textContent =
      "Could not load assets/phrases.md — make sure it ships with this page.";
    document.getElementById("footer").textContent = String(err);
    return;
  }

  // Support ?d=N to lock to a specific day-of-epoch (for shareable links).
  // N is a non-negative integer count of days since EPOCH; invalid values
  // silently fall through to today.
  const params = new URLSearchParams(window.location.search);
  const rawD = params.get("d");
  const parsedD = rawD === null ? NaN : parseInt(rawD, 10);
  const isLocked = Number.isInteger(parsedD) && parsedD >= 0 && String(parsedD) === rawD;
  const now = isLocked ? new Date(EPOCH.getTime() + parsedD * 86400000) : new Date();
  const ordered = stableOrder(phrases);
  // Compute all per-day state from a date: phrase, palette, speaker corners.
  // Closes over ordered so rollover can recompute without re-fetching.
  function computeDay(date) {
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const dayNum = daysSinceEpoch(date);
    const idx = dayNum % ordered.length;
    const altIdx = (idx + Math.floor(ordered.length / 2)) % ordered.length;

    const hue = ((idx * 47) + (dayNum * 31)) % 360;
    const altHue = (hue + 180 + (idx * 13) % 60 - 30) % 360;
    const jitter = (idx * 7) % 8;

    let bgL, fgL, bgS, fgS;
    if (prefersDark) {
      bgL = 6 + jitter;
      fgL = 86 + (jitter % 6);
      bgS = 30 + (idx * 11) % 20;
      fgS = 60 + (idx * 17) % 25;
    } else {
      bgL = 90 + (jitter % 6);
      fgL = 10 + jitter;
      bgS = 35 + (idx * 11) % 20;
      fgS = 65 + (idx * 17) % 25;
    }

    const step = prefersDark ? 1 : -1;
    while (
      contrastRatio([hue, bgS, bgL], [altHue, fgS, fgL]) < MIN_CONTRAST &&
      fgL + step >= 0 && fgL + step <= 100
    ) {
      fgL += step;
    }

    // tr is reserved for the share button, so the speaker rotates among the
    // other three corners.
    const corners = ["tl", "bl", "br"];
    const cornerRng = mulberry32(idx * 1000 + dayNum);

    return {
      idx,
      phrase: ordered[idx].text,
      phraseNum: ordered[idx].num,
      altIdx,
      altPhrase: ordered[altIdx].text,
      altPhraseNum: ordered[altIdx].num,
      dateStr: date.toLocaleDateString(undefined, {
        weekday: "long", month: "long", day: "numeric", year: "numeric"
      }),
      isoDate: date.toISOString().slice(0, 10),
      bg: `hsl(${hue}, ${bgS}%, ${bgL}%)`,
      fg: `hsl(${altHue}, ${fgS}%, ${fgL}%)`,
      cornerA: corners[Math.floor(cornerRng() * 3)],
      cornerB: corners[Math.floor(cornerRng() * 3)]
    };
  }

  let day = computeDay(now);

  const dateEl = document.getElementById("date");
  dateEl.textContent = day.dateStr;
  dateEl.setAttribute("datetime", day.isoDate);

  const phraseEl = document.getElementById("phrase");
  const footerEl = document.getElementById("footer");
  phraseEl.textContent = day.phrase;
  footerEl.textContent = `№ ${day.phraseNum} of ${totalCount}`;

  function applyPalette(background, foreground) {
    document.body.style.backgroundColor = background;
    document.body.style.color = foreground;
  }
  applyPalette(day.bg, day.fg);

  let showingAlt = false;

  // Speaker button: reads the current phrase aloud via the device's TTS.
  const speakerEl = document.getElementById("speaker");
  const hasSpeech = "speechSynthesis" in window;
  if (!hasSpeech) speakerEl.hidden = true;

  function placeSpeaker(corner) {
    speakerEl.classList.remove("tl", "tr", "bl", "br");
    speakerEl.classList.add(corner);
  }
  placeSpeaker(day.cornerA);

  function speak(text) {
    if (!hasSpeech) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.95;
    u.pitch = 1.0;
    speakerEl.classList.add("speaking");
    u.onend = () => speakerEl.classList.remove("speaking");
    u.onerror = () => speakerEl.classList.remove("speaking");
    speechSynthesis.speak(u);
  }

  speakerEl.addEventListener("click", (e) => {
    e.stopPropagation();
    speak(showingAlt ? day.altPhrase : day.phrase);
  });

  // Share button: when unlocked, copies a ?d=N URL pinned to the displayed
  // day. When the page is already locked (?d= present and valid), the icon
  // becomes 🔒 and tapping it drops the query and navigates to today.
  const shareEl = document.getElementById("share");
  const shareSpan = document.getElementById("share-icon");
  const originalIcon = shareSpan.innerHTML;
  if (isLocked) {
    shareSpan.textContent = "🔒";
    shareEl.setAttribute("aria-label", "Unlock to today's phrase");
    shareEl.addEventListener("click", (e) => {
      e.stopPropagation();
      window.location.assign(window.location.pathname + window.location.hash);
    });
  } else {
    shareEl.addEventListener("click", async (e) => {
      e.stopPropagation();
      const url = new URL(window.location.href);
      url.search = `?d=${daysSinceEpoch(new Date())}`;
      try {
        await navigator.clipboard.writeText(url.toString());
      } catch {
        const tmp = document.createElement("input");
        tmp.value = url.toString();
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand("copy");
        tmp.remove();
      }
      shareEl.classList.add("copied");
      shareSpan.textContent = "✓";
      setTimeout(() => {
        shareEl.classList.remove("copied");
        shareSpan.innerHTML = originalIcon;
      }, 1500);
    });
  }

  // Easter egg: tap the phrase to crossfade between today's phrase and its
  // pair at (idx + 366) % phrases.length. The pair inverts the palette — fg and
  // bg swap — so each phrase visually claims the opposite half of the day's
  // color scheme. The speaker also hops to its alternate corner.
  phraseEl.addEventListener("click", () => {
    if (hasSpeech) speechSynthesis.cancel();
    speakerEl.classList.remove("speaking");
    phraseEl.classList.add("fading");
    setTimeout(() => {
      showingAlt = !showingAlt;
      phraseEl.textContent = showingAlt ? day.altPhrase : day.phrase;
      footerEl.textContent = showingAlt
        ? `№ ${day.altPhraseNum} of ${totalCount}`
        : `№ ${day.phraseNum} of ${totalCount}`;
      applyPalette(showingAlt ? day.fg : day.bg, showingAlt ? day.bg : day.fg);
      placeSpeaker(showingAlt ? day.cornerB : day.cornerA);
      phraseEl.classList.remove("fading");
    }, 600);
  });

  // Soft rollover: crossfade to the next day's phrase at midnight.
  // The permutation is fixed, so no year-boundary reload is needed.
  function rollover() {
    const rollNow = new Date();
    const next = computeDay(rollNow);
    if (next.idx === day.idx) return;
    showingAlt = false;
    if (hasSpeech) speechSynthesis.cancel();
    speakerEl.classList.remove("speaking");
    phraseEl.classList.add("fading");
    setTimeout(() => {
      day = next;
      phraseEl.textContent = day.phrase;
      footerEl.textContent = `№ ${day.phraseNum} of ${totalCount}`;
      dateEl.textContent = day.dateStr;
      dateEl.setAttribute("datetime", day.isoDate);
      applyPalette(day.bg, day.fg);
      placeSpeaker(day.cornerA);
      phraseEl.classList.remove("fading");
    }, 600);
  }

  function msUntilMidnight() {
    const mnow = new Date();
    const midnight = new Date(mnow.getFullYear(), mnow.getMonth(), mnow.getDate() + 1);
    return midnight - mnow;
  }
  function scheduleRollover() {
    setTimeout(() => { rollover(); scheduleRollover(); }, msUntilMidnight() + 1000);
  }
  if (!isLocked) scheduleRollover();

  // React to OS theme changes mid-session by reloading so the palette recomputes.
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
    location.reload();
  });
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw-phrase-a-day.js');
}
</script>
</body>
</html>
