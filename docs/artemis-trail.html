<title>The Artemis Trail</title>
<meta name="title" content="The Artemis Trail — A Lunar Odyssey">

<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap');
:root{--green:#33ff33;--green-dim:#1a9a1a;--green-glow:#33ff3366;--amber:#ffb000;--red:#ff3333;--bg:#0a0a0a;--scanline:rgba(0,0,0,0.15)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'VT323',monospace}
#crt{width:100%;height:100%;background:var(--bg);color:var(--green);position:relative;overflow:hidden}
#crt::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,var(--scanline) 0px,var(--scanline) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:10}
#crt::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.6) 100%);pointer-events:none;z-index:11}
#screen{position:relative;z-index:5;width:100%;height:100%;display:flex;flex-direction:column;padding:20px;padding:max(20px,env(safe-area-inset-top)) max(20px,env(safe-area-inset-right)) max(20px,env(safe-area-inset-bottom)) max(20px,env(safe-area-inset-left));overflow-y:auto}
#screen::-webkit-scrollbar{width:0}
.subtitle{text-align:center;font-size:28px;color:var(--amber);text-shadow:0 0 15px rgba(255,176,0,0.4);margin-bottom:4px;letter-spacing:6px}
.credits{text-align:center;font-size:18px;color:var(--green-dim);margin-bottom:20px}
.tb{font-size:22px;line-height:1.5;margin-bottom:10px;text-shadow:0 0 5px var(--green-glow)}
.ta{color:var(--amber);text-shadow:0 0 5px rgba(255,176,0,0.3)}
.tr{color:var(--red);text-shadow:0 0 5px rgba(255,50,50,0.3)}
.td{color:var(--green-dim)}
.btn{font-family:'VT323',monospace;font-size:22px;background:transparent;color:var(--green);border:1px solid var(--green);padding:8px 24px;cursor:pointer;margin:4px 6px;text-shadow:0 0 5px var(--green-glow);transition:all 0.1s}
.btn:hover{background:var(--green);color:var(--bg);text-shadow:none}
.btn.a{color:var(--amber);border-color:var(--amber)}.btn.a:hover{background:var(--amber);color:var(--bg)}
.btn.r{color:var(--red);border-color:var(--red)}.btn.r:hover{background:var(--red);color:var(--bg)}
.sbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:6px;border:1px solid var(--green-dim);padding:8px;margin:8px 0;font-size:19px}
.sbar .l{color:var(--green-dim)}.sbar .v{color:var(--green)}.sbar .v.w{color:var(--amber)}.sbar .v.d{color:var(--red)}
.pbar{width:100%;height:16px;border:1px solid var(--green-dim);margin:6px 0;position:relative}
.pfill{height:100%;background:var(--green);transition:width 0.5s;box-shadow:0 0 8px var(--green-glow)}
.ascii{font-size:14px;line-height:1.2;white-space:pre;color:var(--green);text-shadow:0 0 4px var(--green-glow);margin:8px 0}
.blink{animation:bl 1s step-end infinite}@keyframes bl{50%{opacity:0}}
.fin{animation:fi 0.5s ease-out}@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.br{margin:8px 0;display:flex;flex-wrap:wrap;gap:4px}
.shift-label{font-size:16px;color:var(--green-dim);border-bottom:1px solid var(--green-dim);padding-bottom:4px;margin-bottom:6px}
.gauges{display:flex;justify-content:center;gap:2px;margin:8px 0;padding:8px 4px;border:1px solid var(--green-dim)}
.gauge{display:flex;flex-direction:column;align-items:center;width:clamp(36px,12vw,56px)}
.gauge .g-label{font-size:clamp(11px,2.5vw,14px);color:var(--green-dim);margin-bottom:2px;white-space:nowrap}
.gauge .g-val{font-size:clamp(12px,2.8vw,16px);margin-bottom:2px;font-weight:bold}
.gauge .g-col{display:flex;flex-direction:column;align-items:center;gap:0;width:100%}
.gauge .g-cell{width:100%;height:clamp(6px,1.3vw,9px);margin:0;border-left:1px solid rgba(255,255,255,0.03);border-right:1px solid rgba(255,255,255,0.03)}
.gauge .g-cell.on{box-shadow:inset 0 0 4px currentColor}
.gauge .g-cell.off{background:rgba(255,255,255,0.03)}
.g-green{color:var(--green);background:var(--green)}
.g-amber{color:var(--amber);background:var(--amber)}
.g-red{color:var(--red);background:var(--red)}
.g-glow-green{color:var(--green);text-shadow:0 0 6px var(--green-glow)}
.g-glow-amber{color:var(--amber);text-shadow:0 0 6px rgba(255,176,0,0.4)}
.g-glow-red{color:var(--red);text-shadow:0 0 6px rgba(255,50,50,0.4)}
.telem{border:1px solid var(--green-dim);padding:6px 10px;margin:8px 0;font-size:15px;color:var(--green-dim);display:grid;grid-template-columns:1fr 1fr;gap:2px 12px}
.telem .tl{color:var(--green-dim)}.telem .tv{color:var(--green)}
.telem .tv.tw{color:var(--amber)}.telem .tv.td{color:var(--red)}
@media(max-width:600px){.subtitle{font-size:20px;letter-spacing:3px}.tb,.btn{font-size:18px}.ascii{font-size:10px}#screen{padding:12px}.gauges{gap:1px;padding:6px 2px}.gauge{width:clamp(30px,13vw,44px)}.gauge .g-cell{height:5px}.telem{font-size:13px;grid-template-columns:1fr}}
</style>

const SHIFT_NAMES=['Alpha (00:00–08:00)','Bravo (08:00–16:00)','Charlie (16:00–00:00)'];
const SHIFT_LABELS=['ALPHA','BRAVO','CHARLIE'];
const SHIFT_ICONS=['☽','☀','☆'];
const DATES=['Apr 1','Apr 2','Apr 3','Apr 4','Apr 5','Apr 6','Apr 7','Apr 8','Apr 9','Apr 10'];
const DAY_NAMES=['Launch & High Earth Orbit','TLI Burn — Moon Bound','Outbound Coast','Deep Space Transit','Lunar Sphere of Influence','Lunar Flyby — Far Side','Return Trajectory','Homeward Coast','Earth Approach','Re-entry & Splashdown'];
const DAY_DESCS=['SLS launches from LC-39B at 6:35 PM EDT. Orion enters high elliptical orbit. Prox ops demo with ICPS.','Translunar injection: 5 min 55 sec burn. Orion leaves Earth orbit — first crew beyond LEO since 1972.','First trajectory correction burn. CPR demo in zero-g. Medical kit checkout. DSN emergency comms test.','Second outbound correction burn. AVATAR organ-chip experiment. Crew reviews lunar surface targets.','Moon becomes primary gravity. Final outbound correction burn. Camera prep for flyby.','Closest approach: ~4,100 mi above far side. Record: 252,021 mi from Earth. 30-50 min blackout.','Off-duty day. Lunar gravity slingshot bends trajectory home. Free-return path confirmed.','First return correction burn. Earth grows in windows. Science data downlink.','Final return corrections. Crew dons Orion Crew Survival System suits. Service module sep prep.','Service module jettisoned. Steeper single-entry (not skip). Splashdown 8:07 PM EDT off San Diego. USS John P. Murtha recovery.'];

// ─── DSN GROUND STATIONS — rotate with shifts (120° apart) ───
const DSN_STATIONS=[
  {name:'Goldstone, CA',dish:'DSS-24/25/26 (34m array)',note:'70m DSS-14 offline since Sep 2025 — damaged by over-rotation'},
  {name:'Canberra, AUS',dish:'DSS-43 (70m) + DSS-35/36 (34m)',note:'Primary deep-space link for Southern Hemisphere passes'},
  {name:'Madrid, ESP',dish:'DSS-63 (70m) + DSS-56 (34m)',note:'DSS-56 is the newest "all-in-one" antenna in the network'},
];
// Simulated mission telemetry per shift
const TELEM_DIST=[0,0,0,6000,40000,100000,160000,200000,250000,300000,340000,370000,395000,406841,400000,380000,350000,300000,250000,200000,150000,100000,60000,30000,10000,2000,500,200,80,0];
const TELEM_SPEED=[0,28000,27500,39000,15000,7200,5500,4200,3500,2800,2200,1800,1500,1200,1500,2000,2800,3500,4200,5500,7200,9500,12000,16000,22000,28000,32000,36000,39800,0];
const SPACE_WX=['Quiet — no significant activity','Quiet — background flux nominal','Minor B-class flare detected on far side of Sun','Quiet — solar wind 380 km/s','Elevated — C2.3 flare, proton flux rising','Moderate — solar wind gust 520 km/s, monitoring','Quiet — CME observed but Earth-directed unlikely','Minor — small coronal hole high-speed stream','Quiet — Kp index 2, geomagnetically calm','Active — M1.1 flare, SWPC watching for CME','Quiet — all clear from NOAA SWPC','Elevated — proton event warning, crew advised','Quiet — beautiful aurora reported from ISS altitude','Minor — brief radio blackout R1 on daylit hemisphere','Quiet — nominal conditions for deep space ops'];

function dsnForShift(){return DSN_STATIONS[S.shift]||DSN_STATIONS[0]}
function metStr(){const h=S.totalShifts*8;const d=Math.floor(h/24);const hr=h%24;return`T+${d}d ${String(hr).padStart(2,'0')}:00`}
function signalDelay(){const d=TELEM_DIST[S.totalShifts]||0;if(d<1000)return'<0.01s';const lt=d*1.609/299792;return lt.toFixed(1)+'s one-way'}
function telemetryHTML(){
  const dsn=dsnForShift();
  const dist=TELEM_DIST[Math.min(S.totalShifts,29)]||0;
  const spd=TELEM_SPEED[Math.min(S.totalShifts,29)]||0;
  const wx=SPACE_WX[(S.totalShifts*7+S.day*3)%SPACE_WX.length];
  const wxCls=wx.startsWith('Active')||wx.startsWith('Elevated')?'tv tw':wx.startsWith('Moderate')?'tv tw':'tv';
  const distStr=dist>1000?(dist/1.609).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')+' mi':dist+' km';
  const spdStr=spd>0?(spd*0.621371).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')+' mph':'—';
  return`<div class="telem">
    <div><span class="tl">MET:</span> <span class="tv">${metStr()}</span></div>
    <div><span class="tl">Range:</span> <span class="tv">${distStr}</span></div>
    <div><span class="tl">Velocity:</span> <span class="tv">${spdStr}</span></div>
    <div><span class="tl">Signal:</span> <span class="tv">${signalDelay()} (S+Ka band)</span></div>
    <div><span class="tl">DSN:</span> <span class="tv">${dsn.name}</span></div>
    <div><span class="tl">Antenna:</span> <span class="tv">${dsn.dish}</span></div>
    <div style="grid-column:1/-1"><span class="tl">Space Wx:</span> <span class="${wxCls}">${wx}</span></div>
    <div style="grid-column:1/-1"><span class="tl">DSN Note:</span> <span class="tv" style="color:var(--green-dim)">${dsn.note}</span></div>
  </div>`;
}

// ─── SCRIPTED EVENTS ───
const SCRIPTED={};
SCRIPTED['0-0']={type:'launch'};
SCRIPTED['0-1']={type:'toilet'};
SCRIPTED['0-2']={text:'Crew sleeps in two 4-hour blocks — interrupted by the perigee raise burn. Koch sleeps heads-down in the docking tunnel "like a bat." Wiseman dozes under the displays. Glover wishes for warmer sleeping bags.',effect:{morale:-5},flavor:'sleep'};
SCRIPTED['1-0']={text:'Wake-up song: "Green Light" by John Legend. Wiseman is first to use the flywheel exercise device. Koch preps systems for the TLI burn. The crew has had only two short naps in 30 hours.',effect:{morale:10},flavor:'good'};
SCRIPTED['1-1']={text:'TLI BURN! 5 min 55 sec. The European Service Module engine fires, accelerating Orion by 900 mph. Capcom Birch: "Integrity, looks like a good burn." Orion breaks free of Earth orbit. Hansen: "Humanity has once again shown what we are capable of."',effect:{morale:15,systems:5,fuel:-10},flavor:'good'};
SCRIPTED['1-2']={text:'The crew gathers for their first real meal together — rehydrated food heated in the suitcase-style warmer. Wiseman: "You could see the entire globe, pole to pole. Africa, Europe... the northern lights."',effect:{morale:10},flavor:'good'};
SCRIPTED['2-1']={text:'DSN HANDOFF: Orion\'s link passes from Goldstone to Canberra as Earth rotates. Two 34m dishes in Australia lock on — receiving 6 Mbps of S-band telemetry at 160,000 km. Signal: nominal.',effect:{systems:5},flavor:'good'};
SCRIPTED['4-1']={text:'DISTANCE RECORD BROKEN! Orion passes 248,655 miles — the Apollo 13 record set in 1970 falls after 56 years. New record: 252,021 statute miles from Earth.',effect:{morale:25},flavor:'record'};
SCRIPTED['5-0']={text:'The Moon fills every window like a basketball at arm\'s length. Koch: "Knowing we\'re about to see the far side... I\'m really excited." Glover: "We\'re sending the first woman\'s eyes to the Moon — she may see colors we can\'t."',effect:{morale:15},flavor:'lunar'};
SCRIPTED['5-1']={text:'COMMS BLACKOUT — 30 minutes of silence as Orion passes behind the Moon. The crew is utterly alone — farther from any other human than anyone in history. Then the radio crackles back: "Integrity, Houston, welcome back."',effect:{morale:10},flavor:'lunar'};
SCRIPTED['5-2']={text:'SOLAR ECLIPSE! The Sun disappears behind the Moon — photographed by a camera on the solar array wing. Glover: "We saw great sim, but when it actually happened, it just blew us all away." Far side wasn\'t as illuminated as hoped due to the April 1 launch — this eclipse is the consolation prize.',effect:{morale:20},flavor:'lunar'};
SCRIPTED['5-2b_unused']=1;// marker
SCRIPTED['6-2']={text:'Live downlink with President Trump from the White Flight Control Room. Crew waves from screens after their historic lunar flyby. A moment for the history books.',effect:{morale:12},flavor:'good'};
SCRIPTED['9-0']={text:'Final return burn: 8 seconds, 4.2 ft/s delta-v. Wake-up songs: "Run to the Water" by Live and "Free" by Zac Brown Band — crew-selected. Wiseman and Glover pose with a photo of Earth taken just after the burn.',effect:{morale:10,fuel:-3},flavor:'good'};
SCRIPTED['6-0']={text:'OFF-DUTY DAY. The crew rests, takes personal time, and gazes at the receding Moon. No major burns or tests scheduled — the only such day in the mission.',effect:{morale:15},flavor:'good'};
SCRIPTED['7-1']={text:'Amateur radio operators across 14 countries report successfully tracking Orion\'s S-band signal. The Green Bank 100m telescope in West Virginia bounces radar off Orion\'s hull for independent tracking data.',effect:{morale:8,systems:5},flavor:'good'};
SCRIPTED['9-1']={text:'SERVICE MODULE JETTISONED. Crew module thrusters fire 19s to separate. Steeper entry profile (not skip re-entry — changed after Artemis I heat shield erosion). Max velocity 24,661 mph, 35× speed of sound. 6-min plasma blackout.',effect:{morale:5,systems:-5},flavor:'reentry'};
SCRIPTED['9-2']={type:'splashdown'};

  {text:'Routine systems check. Orion performing within all parameters. Wiseman signs off: "Integrity is go across the board."',effect:{}},

  {text:'Exercise session on the flywheel device. Heart rates and O₂ consumption logged for the ARCHAR crew health study.',effect:{morale:3}},

  {text:'DSN Canberra reports clean signal lock at 2.1 Mbps. Routine telemetry pass — nothing exciting, which is exactly what everyone wants.',effect:{}},
];

// ─── CHOICES ───
const CHOICES=[
  {title:'Power Allocation Dilemma',desc:'Solar panel output dipped below forecast. Prioritize power for the next shift.',
    opts:[{t:'Prioritize life support',e:{o2:8,water:5,systems:-8}},{t:'Prioritize nav & GNC',e:{systems:8,morale:-5}},{t:'Balanced reduction',e:{power:-8}}]},
  {title:'Course Correction Decision',desc:'Telemetry: 0.3° off free-return trajectory. Correct now (uses fuel) or wait?',
    opts:[{t:'Immediate burn',e:{systems:8,fuel:-12}},{t:'Wait for better tracking',e:{morale:-8}},{t:'Manual star sighting first',e:{morale:3,systems:5}}]},
  {title:'Crew Rest vs. Repairs',desc:'An ECLSS sensor needs attention but the crew hasn\'t slept in 16 hours.',
    opts:[{t:'Repair now, sleep later',e:{systems:12,morale:-12}},{t:'Sleep first, fix next shift',e:{morale:12,systems:-5}},{t:'Split — two sleep, two fix',e:{morale:-3,systems:5}}]},
  {title:'Radiation Shelter Alert',desc:'NOAA SWPC reports M1.1 solar flare. Proton flux rising. CME possible within 36 hours.',
    opts:[{t:'Full shelter protocol now',e:{morale:-8,o2:-5}},{t:'Ignore — AVATAR data nominal',e:{morale:5}},{t:'Partial shielding, monitor SWPC',e:{morale:-3}}]},
  {title:'Urine Dump Timing',desc:'Collection container full. GNC warns dumping overboard could create thrust that confuses nav sensors.',
    opts:[{t:'Dump now, recalibrate GNC',e:{water:8,systems:-8}},{t:'Wait for approved window',e:{morale:-5}},{t:'Store in backup container',e:{water:-5}}]},
  {title:'Flywheel Exercise Device Issue',desc:'The exercise flywheel is making an unusual grinding noise. Crew fitness data is critical for ARCHAR.',
    opts:[{t:'Full teardown & fix',e:{systems:10,morale:-5}},{t:'Reduce usage, log data',e:{morale:-3}},{t:'Ignore — noise is normal in 0g',e:{morale:3}}]},
  {title:'DSN Antenna Congestion',desc:'JPL reports DSN is overloaded — Artemis II is consuming hundreds of antenna-hours. Voyager 2 and JWST need time. Reduce your downlink rate?',
    opts:[{t:'Reduce to 1 Mbps (free up DSN)',e:{morale:5,systems:-5}},{t:'Hold full rate (mission priority)',e:{morale:-5,systems:5}},{t:'Negotiate split windows with JPL',e:{morale:3}}]},
  {title:'CME Intercept Decision',desc:'DONKI data shows a coronal mass ejection en route — ETA 18 hours. It may miss. Sheltering costs O₂ and time.',
    opts:[{t:'Full radiation shelter now',e:{morale:-10,o2:-8}},{t:'Wait for updated trajectory',e:{morale:-3}},{t:'Shelter crew, keep systems exposed',e:{morale:-5,systems:-8}}]},
  {title:'Ka-band Antenna Gimbal Sticking',desc:'The high-gain Ka-band antenna gimbal is intermittent. S-band still works but at much lower data rate — no HD video.',
    opts:[{t:'EVA prep to inspect (risky)',e:{systems:15,morale:-10,o2:-5}},{t:'Switch to S-band only',e:{systems:-5,morale:-5}},{t:'Cycle gimbal power & hope',e:{systems:5}}]},
];

const TOILET_CHOICE={
  title:'Toilet Fan Controller Failure',
  desc:'Fan controller jammed — airflow can\'t pull urine into the waste tank. Koch volunteers as space plumber. Houston uploading repair procedures.',
  opts:[
    {t:'Koch fixes it now (lose sleep)',e:{systems:8,morale:5},r:'Koch removes and reinstalls fan components per Houston\'s instructions. After 2 hours: "Houston, the toilet is nominal." But hold off dumping urine overboard — GNC warns it could produce unwanted thrust.'},
    {t:'Use backup bags, fix next shift',e:{morale:-12},r:'The crew breaks out flight-approved collection bags. Apollo astronauts had it worse — remember the Apollo 10 floating debris incident. Morale takes a hit.'},
    {t:'Partial fix — cycle the controller',e:{systems:5,morale:-5},r:'Hansen gets the fan spinning intermittently by power-cycling the controller. Usable but unreliable. Houston wants a full teardown next shift.'},
  ]
};

let S={};
function init(){
  S={day:0,shift:-1,totalShifts:0,maxShifts:30,
    res:{o2:100,water:100,food:100,power:100,fuel:100,systems:100},morale:85,
    crew:['CDR','PLT','MS1','MS2'],log:[],choicesUsed:[],diff:'normal',toiletDone:false};
}
function render(h){scr.innerHTML='';const d=document.createElement('div');d.className='fin';d.innerHTML=h;scr.appendChild(d);scr.scrollTop=0}
function clamp(v){return Math.round(Math.max(0,Math.min(100,v))*10)/10}
function fx(e){if(!e)return;for(const[k,v]of Object.entries(e)){if(k==='morale')S.morale=clamp(S.morale+v);else if(S.res[k]!==undefined)S.res[k]=clamp(S.res[k]+v)}}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function rc(v){return v>60?'v':v>30?'v w':'v d'}
function pv(v){const r=Math.round(v*10)/10;return r%1===0?r.toFixed(0):r.toFixed(1)}
function fmtFx(e){if(!e||!Object.keys(e).length)return'No significant impact.';
  return Object.entries(e).map(([k,v])=>{const n={o2:'O₂',water:'H₂O',food:'Food',power:'Power',fuel:'Fuel',systems:'Systems',morale:'Morale'}[k]||k;return n+': '+(v>0?'+':'')+v+'%'}).join(' | ')}
function isCritical(){return Object.values(S.res).some(v=>v<=0)||S.morale<=0}

function gaugeHTML(label,val){
  const ROWS=10,filled=Math.round(val/10);
  const gc=val>60?'g-glow-green':val>30?'g-glow-amber':'g-glow-red';
  let cells='';
  for(let i=ROWS;i>=1;i--){
    if(i<=filled){cells+=`<div class="g-cell on ${i<=3?'g-red':i<=6?'g-amber':'g-green'}"></div>`}
    else{cells+=`<div class="g-cell off"></div>`}
  }
  return`<div class="gauge"><div class="g-label">${label}</div><div class="g-val ${gc}">${pv(val)}</div><div class="g-col">${cells}</div></div>`;
}

function statusHTML(){
  const r=S.res,d=S.day,sh=S.shift;
  const pct=(S.totalShifts/S.maxShifts*100).toFixed(0);
  const shIcon=sh>=0?SHIFT_ICONS[sh]:'';
  return`
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    <div class="shift-label">
      Day ${d+1}/10 — ${DATES[d]} — ${DAY_NAMES[d]}<br>
      Shift: ${shIcon} ${SHIFT_NAMES[sh]||'—'} &nbsp;(${S.totalShifts}/${S.maxShifts} shifts elapsed)
    </div>
    <div style="font-size:15px;color:var(--green-dim);margin-bottom:6px;font-style:italic">${DAY_DESCS[d]}</div>
    <div class="gauges">
      ${gaugeHTML('O₂',r.o2)}${gaugeHTML('H₂O',r.water)}${gaugeHTML('Food',r.food)}${gaugeHTML('Pwr',r.power)}${gaugeHTML('Fuel',r.fuel)}${gaugeHTML('Sys',r.systems)}${gaugeHTML('MRL',S.morale)}
    </div>
    <div style="font-size:15px;color:var(--green-dim)">Crew: ${S.crew.map(c=>c+' ✓').join('  ')}</div>
    ${telemetryHTML()}`;
}

function nextLabel(){
  if(S.shift===2){
    if(S.day>=9)return'Begin Re-entry →';
    return`Day ${S.day+2} ${SHIFT_LABELS[0]} →`;
  }
  return`${SHIFT_LABELS[(S.shift+1)%3]} Shift →`;
}

function showTitle(){
  render(`
    <div class="ascii" style="text-align:center;color:var(--amber);text-shadow:0 0 8px rgba(255,176,0,0.3)">${SHIP}</div>
    <div class="subtitle">THE ARTEMIS TRAIL</div>
    <div class="credits">A Lunar Odyssey — Based on the Real Artemis II Mission</div>
    <div class="credits" style="font-size:14px;margin-bottom:10px">v1.2</div>
    <div class="tb" style="text-align:center">April 1, 2026. Kennedy Space Center, LC-39B.<br>You command Orion "Integrity" — humanity's<br>first crewed moonshot in 53 years.</div>
    <div class="tb td" style="text-align:center">Four crew. Ten days. Thirty shifts. 685,000 miles.<br>Mission Control runs three 8-hour rotations per day.<br>Fix the toilet. Break the distance record. Come home.</div>
    <div class="br" style="justify-content:center">
      <button class="btn" onclick="startGame('easy')">Astronaut Candidate</button>
      <button class="btn a" onclick="startGame('normal')">Mission Specialist</button>
      <button class="btn r" onclick="startGame('hard')">Flight Commander</button>
    </div>
    <div class="tb blink td" style="text-align:center;font-size:18px;margin-top:16px">▶ SELECT DIFFICULTY TO LAUNCH ◀</div>`);
}

function startGame(d){
  init();S.diff=d;
  if(d==='easy'){S.morale=95;for(let k in S.res)S.res[k]=100}
  if(d==='hard'){S.morale=70;S.res.fuel=80;S.res.systems=85}
  showLaunch();
}

function showLaunch(){
  render(`
    <div class="ascii" style="text-align:center">${EARTH}</div>
    <div class="tb ta" style="text-align:center;font-size:26px">T-ZERO — 6:35 PM EDT — APRIL 1, 2026</div>
    <div class="tb" style="text-align:center">Kennedy Space Center, Launch Complex 39B<br>SLS Block 1 roars to life — 8.8 million lbs of thrust.</div>
    <div class="tb">The first piloted moonshot in 53 years.<br>Boosters separate T+2:00. Core MECO T+8:00.<br>ICPS fires. Orion separates. Arrays deploy.<br>Wiseman: "That was an amazing ride."</div>
    <div class="tb td" style="font-size:18px">
      › Commander Reid Wiseman (CDR) — oldest beyond LEO<br>
      › Pilot Victor Glover (PLT) — first person of color beyond LEO<br>
      › MS Christina Koch (MS1) — first woman beyond LEO<br>
      › MS Jeremy Hansen, CSA (MS2) — first non-US citizen beyond LEO</div>
    <div class="tb td" style="font-size:18px">Mission Control: 3 capcom shifts/day (8 hrs each).<br>DSN: Goldstone · Canberra · Madrid — 120° apart for 24/7 coverage.<br>Note: Goldstone 70m DSS-14 is offline — mission flies without it.</div>
    <div class="br" style="justify-content:center">
      <button class="btn a" onclick="advance()">Begin Day 1 — Charlie Shift →</button>
    </div>`);
}

function advance(){
  S.shift++;
  if(S.shift>2){S.shift=0;S.day++}
  S.totalShifts++;
  if(S.totalShifts>S.maxShifts){endGame(true);return}

  const dr=S.diff==='hard'?2.2:S.diff==='easy'?1:1.5;
  S.res.o2=clamp(S.res.o2-dr);S.res.water=clamp(S.res.water-dr);
  S.res.food=clamp(S.res.food-(dr*0.8));S.res.fuel=clamp(S.res.fuel-0.7);

  const key=S.day+'-'+S.shift;
  const sc=SCRIPTED[key];

  if(sc){
    if(sc.type==='launch'){advance();return}
    if(sc.type==='toilet'){showToilet();return}
    if(sc.type==='splashdown'){endGame(true);return}
    if(sc.effect)fx(sc.effect);
    S.log.push({day:S.day+1,shift:SHIFT_LABELS[S.shift],text:sc.text});
    if(isCritical()){showShift(sc.text,sc.flavor||'neutral',true,null);return}
    showShift(sc.text,sc.flavor||'neutral',false,null);
    return;
  }

  const roll=Math.random();
  const bc=S.diff==='hard'?0.4:S.diff==='easy'?0.2:0.3;
  const gc=bc+0.35;
  let ev;
  if(roll<bc)ev=pick(RANDOM_BAD);
  else if(roll<gc)ev=pick(RANDOM_GOOD);
  else ev=pick(RANDOM_NEUTRAL);
  fx(ev.effect);
  S.log.push({day:S.day+1,shift:SHIFT_LABELS[S.shift],text:ev.text});
  if(isCritical()){showShift(ev.text,roll<bc?'bad':'good',true,null);return}

  const ca=CHOICES.filter((_,i)=>!S.choicesUsed.includes(i));
  if(ca.length>0&&Math.random()<0.22){
    const ci=CHOICES.indexOf(ca[Math.floor(Math.random()*ca.length)]);
    S.choicesUsed.push(ci);
    showShift(ev.text,roll<bc?'bad':'good',false,ci);
  }else{
    showShift(ev.text,roll<bc?'bad':'good',false,null);
  }
}

function showToilet(){
  S.toiletDone=true;fx({morale:-8});
  S.log.push({day:1,shift:'BRAVO',text:'TOILET MALFUNCTION — fan controller jammed. Urine system down.'});
  const ch=TOILET_CHOICE;
  render(`
    <div class="ascii" style="text-align:center;color:var(--amber)">${TOILET}</div>
    <div class="tb ta" style="font-size:22px">═══ DAY 1 — BRAVO SHIFT — TOILET MALFUNCTION ═══</div>
    ${statusHTML()}
    <div class="tb tr" style="margin-top:8px">► TOILET MALFUNCTION! The hygiene bay fan controller jams. The urine system is down — solids still work. At least one crew member resorts to a backup bag. Houston radios up repair steps...</div>
    <div class="tb td" style="font-size:17px">Based on real events: within hours of the April 1, 2026 launch, the Orion toilet fan controller jammed. Koch led the overnight repair.</div>
    <div class="tb ta" style="border:1px solid var(--amber);padding:8px;margin:8px 0">⚠ ${ch.title}<br><span style="color:var(--green)">${ch.desc}</span></div>
    <div class="br">${ch.opts.map((o,i)=>`<button class="btn" onclick="toiletFix(${i})">${o.t}</button>`).join('')}</div>`);
}

window.toiletFix=function(i){
  const o=TOILET_CHOICE.opts[i];fx(o.e);
  S.log.push({day:1,shift:'BRAVO',text:'Toilet fix: '+o.t});
  render(`
    <div class="tb ta" style="font-size:22px">═══ TOILET REPAIR RESULT ═══</div>
    ${statusHTML()}
    <div class="tb">${o.r}</div>
    <div class="tb td">${fmtFx(o.e)}</div>
    ${isCritical()?`<div class="tb tr" style="font-size:24px;text-align:center">⚠ CRITICAL FAILURE ⚠</div>
      <div class="br" style="justify-content:center"><button class="btn r" onclick="endGame(false)">Mission Abort →</button></div>`
    :`<div class="tb td" style="font-size:17px">Koch signs off: "Houston, thanks for an awesome first day."</div>
      <div class="br" style="justify-content:center"><button class="btn" onclick="advance()">${nextLabel()}</button></div>`}
  `);
};

function showShift(text,flavor,critical,choiceIdx){
  const isLunar=flavor==='lunar',isRecord=flavor==='record';
  const art=isLunar?`<div class="ascii" style="text-align:center;color:var(--amber)">${MOON}</div>`:'';
  const cls=flavor==='bad'||flavor==='reentry'?'tb tr':(flavor==='good'||flavor==='lunar'||flavor==='record')?'tb ta':'tb';

  let recordBox='';
  if(isRecord)recordBox=`<div class="tb ta" style="font-size:19px;border:1px solid var(--amber);padding:8px;margin:6px 0">
    &#127942; NEW RECORD: 252,021 mi from Earth<br>Previous: Apollo 13 — 248,655 mi (1970) — surpassed by 3,366 mi!</div>`;

  let choiceHTML='';
  if(choiceIdx!==null&&choiceIdx!==undefined){
    const ch=CHOICES[choiceIdx];
    choiceHTML=`<div class="tb ta" style="border:1px solid var(--amber);padding:8px;margin:8px 0">⚠ ${ch.title}<br><span style="color:var(--green)">${ch.desc}</span></div>
      <div class="br">${ch.opts.map((o,i)=>`<button class="btn" onclick="resolveChoice(${choiceIdx},${i})">${o.t}</button>`).join('')}</div>`;
  }

  let contHTML='';
  if(critical){
    contHTML=`<div class="tb tr" style="font-size:24px;text-align:center">⚠ CRITICAL FAILURE ⚠</div>
      <div class="br" style="justify-content:center"><button class="btn r" onclick="endGame(false)">Mission Abort →</button></div>`;
  }else if(choiceIdx===null||choiceIdx===undefined){
    contHTML=`<div class="br" style="justify-content:center">
      <button class="btn" onclick="advance()">${nextLabel()}</button>
      <button class="btn a" onclick="showLog()">Log</button></div>`;
  }

  render(`${art}
    <div class="tb ta" style="font-size:22px">═══ DAY ${S.day+1} — ${SHIFT_LABELS[S.shift]} SHIFT ═══</div>
    ${statusHTML()}
    <div class="${cls}" style="margin-top:8px">► ${text}</div>
    ${recordBox}${choiceHTML}${contHTML}`);
}

window.resolveChoice=function(ci,oi){
  const ch=CHOICES[ci],o=ch.opts[oi];fx(o.e);
  S.log.push({day:S.day+1,shift:SHIFT_LABELS[S.shift],text:ch.title+' → '+o.t});
  render(`
    <div class="tb ta" style="font-size:22px">═══ DECISION RESULT ═══</div>
    ${statusHTML()}
    <div class="tb">You chose: "${o.t}"</div>
    <div class="tb td">${fmtFx(o.e)}</div>
    ${isCritical()?`<div class="tb tr" style="font-size:24px;text-align:center">⚠ CRITICAL FAILURE ⚠</div>
      <div class="br" style="justify-content:center"><button class="btn r" onclick="endGame(false)">Mission Abort →</button></div>`
    :`<div class="br" style="justify-content:center"><button class="btn" onclick="advance()">${nextLabel()}</button></div>`}`);
};

function showLog(){
  render(`
    <div class="tb ta" style="font-size:22px">═══ MISSION LOG — ORION "INTEGRITY" ═══</div>
    ${statusHTML()}
    <div style="margin:8px 0">${S.log.map(l=>`<div class="tb td" style="font-size:17px">Day ${l.day} ${l.shift}: ${l.text}</div>`).join('')}</div>
    <div class="br" style="justify-content:center"><button class="btn" onclick="returnLog()">← Back</button></div>`);
}
window.returnLog=function(){
  render(`
    <div class="tb ta" style="font-size:22px">═══ DAY ${S.day+1} — ${SHIFT_LABELS[S.shift]} SHIFT ═══</div>
    ${statusHTML()}
    <div class="br" style="justify-content:center">
      <button class="btn" onclick="advance()">${nextLabel()}</button>
      <button class="btn a" onclick="showLog()">Log</button></div>`);
};

function endGame(win){
  const sc=win?Math.round((S.morale+Object.values(S.res).reduce((a,b)=>a+b,0)/6)/2):0;
  const rk=sc>85?'FLAWLESS — Worthy of the Golden Age':sc>65?'SUCCESSFUL — Integrity lived up to her name':sc>40?'ROUGH — USS John P. Murtha fished you out':win?'BARELY SURVIVED — Houston relieved':'MISSION LOST';
  render(`
    <div class="ascii" style="text-align:center;color:${win?'var(--amber)':'var(--red)'}">${win?SPLASH:SHIP}</div>
    <div class="tb ${win?'ta':'tr'}" style="font-size:26px;text-align:center">${win?'═══ SPLASHDOWN — APRIL 10, 2026 ═══':'═══ MISSION FAILED ═══'}</div>
    ${win?`<div class="tb" style="text-align:center">8:07 PM EDT — "A perfect bullseye splashdown" for Integrity.<br>40–50 mi off San Diego. USS John P. Murtha (LPD-26) on station.<br>First Navy crew recovery since Apollo-Soyuz, 1975.<br>All four crew safe. Parachutes to 20 mph impact.</div>
      <div class="tb td" style="text-align:center">Glover: "Watching the sun eclipse behind the Moon was the greatest gift of this mission."<br>First crewed moonshot in 53 years: complete.<br>Next: Artemis III — lunar surface — 2028.</div>`
    :`<div class="tb tr" style="text-align:center">Critical failure forced abort.<br>${S.morale<=0?'Crew coordination collapsed.':'Life support could not sustain the crew.'}</div>`}
    <div class="sbar" style="border-color:${win?'var(--amber)':'var(--red)'}">
      <div><span class="l">Score</span> <span class="v">${sc}/100</span></div>
      <div><span class="l">Rating</span> <span class="v">${rk}</span></div>
      <div><span class="l">Shifts</span> <span class="v">${S.totalShifts}/30</span></div>
      <div><span class="l">Diff</span> <span class="v">${S.diff.toUpperCase()}</span></div>
    </div>
    <div class="br" style="justify-content:center">
      <button class="btn a" onclick="showLog()">Full Log</button>
      <button class="btn" onclick="showTitle()">New Mission</button>
    </div>
    <div class="tb blink td" style="text-align:center;font-size:16px;margin-top:16px">Ad astra per aspera</div>`);
}

window.startGame=startGame;window.advance=advance;window.showLog=showLog;
window.endGame=endGame;window.showTitle=showTitle;
init();showTitle();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw-artemis-trail.js');
}
</script>
</body>
